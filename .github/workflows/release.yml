name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      hse_servicefinder_release_created: ${{ steps.release.outputs['packages/hse-servicefinder-mcp--release_created'] }}
      hse_servicefinder_tag: ${{ steps.release.outputs['packages/hse-servicefinder-mcp--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release
    if: ${{ needs.release.outputs.hse_servicefinder_release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@danstuartdept'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @danstuartdept/hse-servicefinder-mcp build

      - name: Run tests
        run: pnpm --filter @danstuartdept/hse-servicefinder-mcp test

      - name: Publish
        run: pnpm --filter @danstuartdept/hse-servicefinder-mcp publish --access restricted --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
