name: CI

on:
  push:
    branches: [main, release/monorepo]
  pull_request:
    branches: [main, release/monorepo]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, typecheck, lint, and test
        run: pnpm turbo run build typecheck lint test

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commits (PR)
        if: github.event_name == 'pull_request'
        run: npx commitlint --last --verbose

      - name: Lint commits (push)
        if: github.event_name == 'push'
        run: npx commitlint --from ${{ github.event.before }} --to ${{ github.sha }} --verbose
